# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.6.0.schema.json
PackageIdentifier: Omibranch.Gitty
PackageVersion: 1.0.0
PackageLocale: en-US
Publisher: Omibranch
PackageName: gitty
License: MIT
LicenseUrl: https://github.com/Omibranch/gitty/blob/main/LICENSE
ShortDescription: Zero-commit Git & GitHub CLI wrapper for Windows
Description: |-
  gitty is a Windows CLI tool that wraps Git and GitHub CLI (gh) into
  simple, human-friendly commands. It handles staging, committing, and
  pushing automatically. Supports proxy, branch management, .gitignore
  templates, and command chaining with 'and'.
Homepage: https://github.com/Omibranch/gitty
Tags:
  - git
  - github
  - cli
  - developer-tools
