name: validate-linux-packages

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  apt-validate:
    name: APT package validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Debian packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev lintian

      - name: Build Linux amd64 binary
        run: |
          mkdir -p dist
          cd source
          GOOS=linux GOARCH=amd64 go build -ldflags='-s -w' -o ../dist/gitty-linux-amd64 .

      - name: Build DEB package
        run: |
          chmod +x pkg/build-deb.sh
          ./pkg/build-deb.sh

      - name: Validate DEB with lintian
        run: |
          lintian pkg/out/gitty_2.0.0_amd64.deb

  aur-validate:
    name: AUR package validation
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Install Arch build tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git go awk grep sed

      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify PKGBUILD and .SRCINFO sync
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c 'cd "$GITHUB_WORKSPACE/pkg/aur" && makepkg --printsrcinfo > /tmp/generated.SRCINFO && diff -u .SRCINFO /tmp/generated.SRCINFO'

      - name: Validate PKGBUILD metadata
        shell: bash
        run: |
          cd pkg/aur
          bash -n PKGBUILD
          source ./PKGBUILD
          test -n "$pkgname"
          test -n "$pkgver"
          test -n "$source_x86_64"
          test -n "$source_aarch64"
